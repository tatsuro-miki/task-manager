<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI タスクマネージャー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2335;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #3dd68c;
    --orange: #f5a623;
    --red: #f25f5c;
    --text: #e2e8f0;
    --text2: #8892aa;
    --text3: #5a6480;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .notif-btn {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .notif-btn:hover { border-color: var(--accent); color: var(--accent); }
  .notif-btn.granted { border-color: rgba(61,214,140,0.4); color: var(--green); background: rgba(61,214,140,0.08); }
  .notif-btn.denied { border-color: rgba(242,95,92,0.4); color: var(--red); }
  .notif-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
  .notif-btn.granted .notif-dot { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  .main { display: flex; flex: 1; overflow: hidden; }

  .task-panel {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }
  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
  .task-count { font-size: 11px; background: var(--surface2); color: var(--text2); padding: 2px 8px; border-radius: 10px; }

  .filter-tabs { display: flex; gap: 4px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .filter-tab {
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    border: none; background: transparent; color: var(--text3);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .filter-tab.active { background: rgba(79,142,247,0.15); color: var(--accent); }
  .filter-tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  .task-list { flex: 1; overflow-y: auto; padding: 8px; }
  .task-list::-webkit-scrollbar { width: 4px; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .task-item {
    padding: 10px 12px; border-radius: 8px;
    border: 1px solid transparent; margin-bottom: 4px;
    transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px;
  }
  .task-item:hover { background: var(--surface2); border-color: var(--border); }
  .task-item.done .task-title { text-decoration: line-through; color: var(--text3); }
  .task-check {
    width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border);
    flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; cursor: pointer; font-size: 11px;
  }
  .task-item.done .task-check { background: var(--green); border-color: var(--green); color: white; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; font-weight: 500; line-height: 1.4; word-break: break-all; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .task-due { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .task-due.overdue { color: var(--red); }
  .task-due.soon { color: var(--orange); }
  .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .p-high { background: var(--red); }
  .p-mid { background: var(--orange); }
  .p-low { background: var(--text3); }
  .task-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(79,142,247,0.12); color: var(--accent); }
  .reminder-icon { font-size: 11px; color: var(--orange); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; line-height: 1.8; }

  /* リマインダー設定パネル */
  .reminder-panel {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    background: rgba(245,166,35,0.03);
    flex-shrink: 0;
  }
  .reminder-panel-title {
    font-size: 11px; color: var(--orange); font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
  }
  .reminder-options { display: flex; flex-direction: column; gap: 5px; }
  .reminder-option { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); cursor: pointer; }
  .reminder-option input[type="checkbox"] { accent-color: var(--orange); width: 13px; height: 13px; cursor: pointer; }
  .reminder-option label { cursor: pointer; }
  .reminder-time-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: var(--text2); }
  .reminder-time-row input[type="time"] {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 4px 8px; outline: none;
  }
  .reminder-time-row input[type="time"]:focus { border-color: var(--orange); }

  /* チャット */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; max-width: 680px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); font-size: 12px; }
  .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13.5px; line-height: 1.6; max-width: 520px; }
  .msg.ai .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .msg-bubble { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border-bottom-right-radius: 4px; }
  .task-preview {
    margin-top: 8px; padding: 8px 12px; background: rgba(0,0,0,0.2);
    border-radius: 8px; border-left: 3px solid var(--green); font-size: 12px; color: var(--text2);
  }
  .task-preview strong { color: var(--green); font-size: 11px; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* トースト */
  .toast-container { position: fixed; top: 60px; right: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast {
    background: var(--surface); border: 1px solid var(--orange); border-radius: 10px;
    padding: 12px 16px; min-width: 240px; max-width: 320px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; pointer-events: all;
  }
  @keyframes slideIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
  .toast.hide { animation: slideOut 0.3s ease forwards; }
  @keyframes slideOut { to{transform:translateX(120%);opacity:0} }
  .toast-title { font-size: 12px; font-weight: 600; color: var(--orange); margin-bottom: 3px; display: flex; align-items: center; justify-content: space-between; }
  .toast-body { font-size: 12px; color: var(--text2); line-height: 1.4; margin-top: 2px; }
  .toast-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; }

  .hint-chips { display: flex; gap: 6px; padding: 0 20px 12px; flex-wrap: wrap; }
  .hint-chip {
    font-size: 11.5px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .hint-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.08); }

  .input-area { padding: 12px 20px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
  .input-wrap {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; display: flex; align-items: flex-end; padding: 10px 14px; transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  #user-input {
    flex: 1; background: transparent; border: none; outline: none; color: var(--text);
    font-family: inherit; font-size: 13.5px; resize: none; max-height: 120px; line-height: 1.5;
  }
  #user-input::placeholder { color: var(--text3); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; font-size: 16px; cursor: pointer;
    flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing-dots span {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); margin: 0 2px; animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }

  .welcome-hint { text-align: center; padding: 30px 20px; color: var(--text3); font-size: 13px; line-height: 1.8; }
  .welcome-hint .icon { font-size: 32px; margin-bottom: 12px; display: block; }
</style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<header>
  <div class="logo">🤖</div>
  <h1>AI タスクマネージャー</h1>
  <div class="header-right">
    <button class="notif-btn" id="notif-btn" onclick="requestNotification()">
      <span class="notif-dot"></span>
      <span id="notif-label">通知を有効にする</span>
    </button>
  </div>
</header>

<div class="main">
  <div class="task-panel">
    <div class="panel-header">
      <span class="panel-title">タスク一覧</span>
      <span class="task-count" id="task-count">0件</span>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterTasks('all',this)">すべて</button>
      <button class="filter-tab" onclick="filterTasks('todo',this)">未完了</button>
      <button class="filter-tab" onclick="filterTasks('done',this)">完了</button>
      <button class="filter-tab" onclick="filterTasks('high',this)">高優先</button>
    </div>
    <div class="task-list" id="task-list">
      <div class="empty-state">タスクはまだありません<br>右のチャットで話しかけてください 💬</div>
    </div>

    <div class="reminder-panel">
      <div class="reminder-panel-title">🔔 リマインダー設定</div>
      <div class="reminder-options">
        <div class="reminder-option">
          <input type="checkbox" id="r-today" checked>
          <label for="r-today">期日当日の朝に通知</label>
        </div>
        <div class="reminder-option">
          <input type="checkbox" id="r-before" checked>
          <label for="r-before">期日の1日前に通知</label>
        </div>
        <div class="reminder-option">
          <input type="checkbox" id="r-overdue" checked>
          <label for="r-overdue">期限切れになったとき</label>
        </div>
      </div>
      <div class="reminder-time-row">
        <span>通知時刻：</span>
        <input type="time" id="r-time" value="09:00">
      </div>
    </div>
  </div>

  <div class="chat-panel">
    <div class="chat-messages" id="chat-messages">
      <div class="welcome-hint">
        <span class="icon">✨</span>
        日本語で話しかけるだけでタスクを管理できます<br>
        左パネルで🔔リマインダーの時刻も設定できます<br>
        まず右上の「通知を有効にする」を押してみてください
      </div>
    </div>
    <div class="hint-chips">
      <button class="hint-chip" onclick="sendHint('タスク一覧を見せて')">📋 一覧</button>
      <button class="hint-chip" onclick="sendHint('今日中にやることを追加したい')">➕ タスク追加</button>
      <button class="hint-chip" onclick="sendHint('優先度の高いタスクは？')">🔥 高優先</button>
      <button class="hint-chip" onclick="sendHint('期限切れのタスクは？')">⚠️ 期限切れ</button>
      <button class="hint-chip" onclick="sendHint('全部完了にして')">✅ 全完了</button>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="user-input" rows="1" placeholder="メッセージを入力... (Shift+Enterで改行)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 状態
// ============================================================
let tasks = [];
let taskIdCounter = 1;
let currentFilter = 'all';
let isLoading = false;
const notifiedSet = new Set();

// ============================================================
// 通知
// ============================================================
function requestNotification() {
  if (!('Notification' in window)) {
    showToast('⚠️ このブラウザは通知未対応です', '', 4000); return;
  }
  if (Notification.permission === 'granted') {
    showToast('✅ 通知はすでに有効です', '', 3000); return;
  }
  Notification.requestPermission().then(p => {
    updateNotifBtn(p);
    if (p === 'granted') showToast('🔔 通知を有効にしました！', 'リマインダーが届くようになります', 4000);
    else showToast('🔕 通知が拒否されました', 'ブラウザ設定から許可してください', 4000);
  });
}

function updateNotifBtn(perm) {
  const btn = document.getElementById('notif-btn');
  const label = document.getElementById('notif-label');
  if (perm === 'granted') { btn.className = 'notif-btn granted'; label.textContent = '通知ON'; }
  else if (perm === 'denied') { btn.className = 'notif-btn denied'; label.textContent = '通知ブロック中'; }
  else { btn.className = 'notif-btn'; label.textContent = '通知を有効にする'; }
}

if ('Notification' in window) updateNotifBtn(Notification.permission);

// ============================================================
// リマインダーチェック（1分ごと）
// ============================================================
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function checkReminders() {
  const now = new Date();
  const todayStr = toDateStr(now);
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
  const tomorrowStr = toDateStr(tomorrow);

  const rTime = document.getElementById('r-time').value || '09:00';
  const [rH, rM] = rTime.split(':').map(Number);
  const isReminderTime = now.getHours() === rH && now.getMinutes() === rM;

  tasks.filter(t => !t.done && t.dueDate).forEach(t => {
    const kToday   = `today-${t.id}-${todayStr}`;
    const kBefore  = `before-${t.id}-${todayStr}`;
    const kOverdue = `overdue-${t.id}-${todayStr}`;

    if (document.getElementById('r-today').checked && t.dueDate === todayStr && isReminderTime && !notifiedSet.has(kToday)) {
      notifiedSet.add(kToday);
      fireNotification('📅 今日が期日です', `「${t.title}」の期日は今日です！`);
    }
    if (document.getElementById('r-before').checked && t.dueDate === tomorrowStr && isReminderTime && !notifiedSet.has(kBefore)) {
      notifiedSet.add(kBefore);
      fireNotification('⏰ 明日が期日です', `「${t.title}」の期日は明日です`);
    }
    if (document.getElementById('r-overdue').checked && t.dueDate < todayStr && !notifiedSet.has(kOverdue)) {
      notifiedSet.add(kOverdue);
      fireNotification('🚨 期限切れ', `「${t.title}」の期日が過ぎています！`);
    }
  });
}

function fireNotification(title, body) {
  if (Notification.permission === 'granted') new Notification(title, { body });
  showToast(title, body, 7000);
}

setInterval(checkReminders, 60000);
setTimeout(checkReminders, 2000); // 起動直後に期限切れチェック

// ============================================================
// トースト
// ============================================================
function showToast(title, body, duration = 5000) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `
    <div class="toast-title">
      <span>${escapeHtml(title)}</span>
      <button class="toast-close" onclick="closeToast(this.closest('.toast'))">✕</button>
    </div>
    ${body ? `<div class="toast-body">${escapeHtml(body)}</div>` : ''}
  `;
  container.appendChild(el);
  setTimeout(() => closeToast(el), duration);
}

function closeToast(el) {
  if (!el || !el.parentElement) return;
  el.classList.add('hide');
  setTimeout(() => el.remove(), 300);
}

// ============================================================
// タスク操作
// ============================================================
function addTask(title, dueDate = null, priority = 'mid', tags = []) {
  const t = { id: taskIdCounter++, title, dueDate, priority, tags, done: false };
  tasks.push(t); renderTasks(); return t;
}
function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; renderTasks(); }
}
function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); renderTasks(); }
function getTasksForAI() {
  return tasks.map(({ id, title, dueDate, priority, tags, done }) => ({ id, title, dueDate, priority, tags, done }));
}

// ============================================================
// レンダリング
// ============================================================
function renderTasks() {
  const list = document.getElementById('task-list');
  document.getElementById('task-count').textContent = `${tasks.filter(t => !t.done).length}件`;

  let filtered = tasks;
  if (currentFilter === 'todo') filtered = tasks.filter(t => !t.done);
  if (currentFilter === 'done') filtered = tasks.filter(t => t.done);
  if (currentFilter === 'high') filtered = tasks.filter(t => t.priority === 'high' && !t.done);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">タスクがありません<br>チャットで追加してください 💬</div>'; return;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  const tomorrowStr = toDateStr(tomorrow);

  list.innerHTML = filtered.map(t => {
    let dueClass = '', dueLabel = '';
    if (t.dueDate) {
      if (t.dueDate < todayStr && !t.done)  { dueClass = 'overdue'; dueLabel = '期限切れ'; }
      else if (t.dueDate === todayStr)       { dueClass = 'soon';    dueLabel = '今日'; }
      else if (t.dueDate === tomorrowStr)    { dueClass = 'soon';    dueLabel = '明日'; }
      else { const d = new Date(t.dueDate); dueLabel = `${d.getMonth()+1}/${d.getDate()}`; }
    }
    return `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div class="task-check" onclick="toggleTask(${t.id})">${t.done ? '✓' : ''}</div>
        <div class="task-body">
          <div class="task-title">${escapeHtml(t.title)}</div>
          <div class="task-meta">
            <div class="priority-dot p-${t.priority}"></div>
            ${t.dueDate ? `<span class="task-due ${dueClass}">${dueLabel}</span>` : ''}
            ${t.tags.map(g => `<span class="task-tag">${escapeHtml(g)}</span>`).join('')}
            ${t.dueDate && !t.done ? `<span class="reminder-icon">🔔</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function filterTasks(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

// ============================================================
// チャット
// ============================================================
function addMsg(role, html, preview = null) {
  const container = document.getElementById('chat-messages');
  container.querySelector('.welcome-hint')?.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
    <div class="msg-bubble">${html}${preview ? `<div class="task-preview"><strong>✅ タスク操作</strong>${escapeHtml(preview)}</div>` : ''}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addTyping() {
  const d = addMsg('ai', '<div class="typing-dots"><span></span><span></span><span></span></div>');
  d.id = 'typing-indicator'; return d;
}
function removeTyping() { document.getElementById('typing-indicator')?.remove(); }

// ============================================================
// AI API
// ============================================================
async function callAI(userMessage) {
  const today = new Date();
  const todayStr = toDateStr(today);
  const tomorrowStr = toDateStr(new Date(today.getFullYear(), today.getMonth(), today.getDate()+1));
  const daysToFri = (5 - today.getDay() + 7) % 7 || 7;
  const fridayStr = toDateStr(new Date(today.getFullYear(), today.getMonth(), today.getDate()+daysToFri));

  const sys = `あなたはタスク管理アシスタントです。
今日: ${todayStr} / 明日: ${tomorrowStr} / 今週金曜: ${fridayStr}
現在のタスク: ${JSON.stringify(getTasksForAI())}

## 応答（JSONのみ返すこと）
{"message":"返答","actions":[...],"summary":"操作説明 or null"}

actionsの種類:
- タスク追加: {"type":"add","title":"名前","dueDate":"YYYY-MM-DD or null","priority":"high/mid/low","tags":[]}
- 完了:       {"type":"complete","id":ID番号}
- 削除:       {"type":"delete","id":ID番号}
- 全完了:     {"type":"completeAll"}

優先度: high=急ぎ/今日/重要, mid=通常(デフォルト), low=いつかやる
期日: 今日→${todayStr} 明日→${tomorrowStr} 今週→${fridayStr} なし→null
JSONのみ。前置き不要。`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: sys,
      messages: [{ role: "user", content: userMessage }]
    })
  });
  const data = await res.json();
  const raw = data.content?.[0]?.text || '{}';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ============================================================
// 送信
// ============================================================
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = ''; autoResize(input);
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addMsg('user', escapeHtml(text));
  addTyping();

  try {
    const result = await callAI(text);
    const summary = [];

    for (const a of (result.actions || [])) {
      if (a.type === 'add') {
        const t = addTask(a.title, a.dueDate, a.priority || 'mid', a.tags || []);
        summary.push(`「${t.title}」を追加`);
        if (a.dueDate) showToast('📌 タスク追加', `「${t.title}」 期日: ${a.dueDate}`, 3000);
      } else if (a.type === 'complete') {
        const t = tasks.find(t => t.id === a.id);
        if (t) { t.done = true; summary.push(`「${t.title}」を完了`); renderTasks(); }
      } else if (a.type === 'delete') {
        const t = tasks.find(t => t.id === a.id);
        if (t) summary.push(`「${t.title}」を削除`);
        deleteTask(a.id);
      } else if (a.type === 'completeAll') {
        tasks.forEach(t => t.done = true); renderTasks();
        summary.push('すべてのタスクを完了');
      }
    }

    removeTyping();
    addMsg('ai', escapeHtml(result.message || '処理しました'), summary.length ? summary.join('、') : null);
  } catch (err) {
    removeTyping();
    addMsg('ai', '⚠️ エラーが発生しました。もう一度試してください。');
    console.error(err);
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function sendHint(text) { document.getElementById('user-input').value = text; sendMessage(); }

// ============================================================
// ユーティリティ
// ============================================================
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,120)+'px'; }
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
