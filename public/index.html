<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI タスクマネージャー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2335;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #3dd68c;
    --orange: #f5a623;
    --red: #f25f5c;
    --text: #e2e8f0;
    --text2: #8892aa;
    --text3: #5a6480;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ヘッダー */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  header h1 { font-size: 14px; font-weight: 600; }
  .notif-btn {
    margin-left: auto;
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    display: flex; align-items: center; gap: 4px; white-space: nowrap; flex-shrink: 0;
  }
  .notif-btn.granted { border-color: rgba(61,214,140,0.4); color: var(--green); background: rgba(61,214,140,0.08); }
  .notif-btn.denied { border-color: rgba(242,95,92,0.4); color: var(--red); }
  .notif-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .notif-btn.granted .notif-dot { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* ボトムタブ（スマホ） */
  .bottom-tabs {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .bottom-tab {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8px 4px;
    font-size: 10px; color: var(--text3);
    cursor: pointer; transition: color 0.15s;
    border: none; background: transparent; font-family: inherit;
    gap: 3px;
  }
  .bottom-tab .tab-icon { font-size: 20px; }
  .bottom-tab.active { color: var(--accent); }
  .bottom-tab .badge {
    background: var(--red); color: white;
    font-size: 9px; padding: 1px 5px; border-radius: 8px;
    min-width: 16px; text-align: center;
  }

  /* メインコンテンツ */
  .main {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* PC: 左右分割 / スマホ: タブ切り替え */
  .panel-wrap {
    display: flex;
    height: 100%;
  }

  .task-panel {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    height: 100%;
  }

  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
  }

  /* スマホ用パネル切り替え */
  @media (max-width: 700px) {
    .bottom-tabs { display: none !important; }
    body { height: auto; overflow: auto; }
    .main { overflow: visible; height: auto; flex: none; }
    .panel-wrap { flex-direction: column; height: auto; }

    .chat-panel {
      order: 1; width: 100%;
      border-right: none; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; transition: all 0.25s ease;
    }
    .chat-panel .chat-messages { min-height: 260px; }
    .chat-panel.collapsed .chat-messages,
    .chat-panel.collapsed .hint-chips,
    .chat-panel.collapsed .input-area { display: none !important; }

    .task-panel {
      order: 2; width: 100%;
      border-right: none; display: flex; flex-direction: column;
      transition: all 0.25s ease;
    }
    .task-panel.collapsed .task-list,
    .task-panel.collapsed .reminder-panel { display: none !important; }
    .task-panel.collapsed .filter-tabs { display: none !important; }

    .task-panel.hidden, .chat-panel.hidden {
      opacity: 1 !important; pointer-events: all !important; transform: none !important;
    }

    .filter-tab { padding: 8px 12px; font-size: 12px; }
    .input-area { padding: 8px 12px 10px; }
    .task-check { width: 24px; height: 24px; }
    .task-item { padding: 12px; }
    .reminder-panel { padding: 8px 12px; }
  }

  /* 折りたたみヘッダー共通 */
  .collapsible-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .collapsible-header .collapse-arrow {
    font-size: 10px; color: var(--text3); transition: transform 0.2s; margin-left: 6px;
  }
  .collapsed .collapse-arrow { transform: rotate(-90deg); }

  /* タスクパネル内 */
  .panel-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-title { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
  .task-count { font-size: 11px; background: var(--surface2); color: var(--text2); padding: 2px 8px; border-radius: 10px; }

  .filter-tabs { display: flex; gap: 3px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .filter-tab {
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    border: none; background: transparent; color: var(--text3);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .filter-tab.active { background: rgba(79,142,247,0.15); color: var(--accent); }
  .filter-tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  .task-list { flex: 1; overflow-y: auto; padding: 8px; }
  .task-list::-webkit-scrollbar { width: 4px; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .task-item {
    padding: 10px 12px; border-radius: 8px; border: 1px solid transparent;
    margin-bottom: 4px; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px;
  }
  .task-item:hover, .task-item:active { background: var(--surface2); border-color: var(--border); }
  .task-item.done .task-title { text-decoration: line-through; color: var(--text3); }
  .task-check {
    width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border);
    flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; cursor: pointer; font-size: 12px;
  }
  .task-item.done .task-check { background: var(--green); border-color: var(--green); color: white; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; font-weight: 500; line-height: 1.4; word-break: break-all; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .task-due { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .task-due.overdue { color: var(--red); }
  .task-due.soon { color: var(--orange); }
  .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .p-high { background: var(--red); }
  .p-mid { background: var(--orange); }
  .p-low { background: var(--text3); }
  .task-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(79,142,247,0.12); color: var(--accent); }
  .reminder-icon { font-size: 11px; color: var(--orange); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; line-height: 1.8; }

  .reminder-panel {
    border-top: 1px solid var(--border); padding: 10px 14px;
    background: rgba(245,166,35,0.03); flex-shrink: 0;
  }
  .reminder-panel-title { font-size: 11px; color: var(--orange); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .reminder-options { display: flex; flex-direction: column; gap: 4px; }
  .reminder-option { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
  .reminder-option input[type="checkbox"] { accent-color: var(--orange); width: 13px; height: 13px; cursor: pointer; }
  .reminder-option label { cursor: pointer; }
  .reminder-time-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; color: var(--text2); }
  .reminder-time-row input[type="time"] {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 4px 8px; outline: none;
  }

  /* チャットパネル */
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 8px; max-width: 100%; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); font-size: 11px; }
  .msg-bubble {
    padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.6;
    max-width: calc(100% - 40px);
  }
  .msg.ai .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .msg-bubble { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border-bottom-right-radius: 4px; }
  .task-preview {
    margin-top: 7px; padding: 7px 10px; background: rgba(0,0,0,0.2);
    border-radius: 7px; border-left: 3px solid var(--green); font-size: 11px; color: var(--text2);
  }
  .task-preview strong { color: var(--green); font-size: 10px; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* トースト */
  .toast-container { position: fixed; top: 56px; right: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; pointer-events: none; max-width: calc(100vw - 24px); }
  .toast {
    background: var(--surface); border: 1px solid var(--orange); border-radius: 10px;
    padding: 10px 14px; min-width: 200px; max-width: 300px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; pointer-events: all;
  }
  @keyframes slideIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
  .toast.hide { animation: slideOut 0.3s ease forwards; }
  @keyframes slideOut { to{transform:translateX(120%);opacity:0} }
  .toast-title { font-size: 12px; font-weight: 600; color: var(--orange); margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; }
  .toast-body { font-size: 11px; color: var(--text2); line-height: 1.4; }
  .toast-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; }

  /* ヒントチップ */
  .hint-chips {
    display: flex; gap: 5px; padding: 0 14px 10px; flex-wrap: nowrap;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .hint-chips::-webkit-scrollbar { display: none; }
  .hint-chip {
    font-size: 11px; padding: 5px 11px; border-radius: 20px; white-space: nowrap;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
    cursor: pointer; transition: all 0.15s; font-family: inherit; flex-shrink: 0;
  }
  .hint-chip:hover { border-color: var(--accent); color: var(--accent); }

  /* 入力エリア */
  .input-area { padding: 10px 14px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
  .input-wrap {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; display: flex; align-items: flex-end; padding: 9px 12px; transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  #user-input {
    flex: 1; background: transparent; border: none; outline: none; color: var(--text);
    font-family: inherit; font-size: 14px; resize: none; max-height: 100px; line-height: 1.5;
  }
  #user-input::placeholder { color: var(--text3); }
  .send-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; font-size: 16px; cursor: pointer;
    flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing-dots span {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); margin: 0 2px; animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }

  .welcome-hint { text-align: center; padding: 30px 16px; color: var(--text3); font-size: 13px; line-height: 1.8; }
  .welcome-hint .icon { font-size: 28px; margin-bottom: 10px; display: block; }

  /* タスク編集モーダル */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; animation: fadeIn 0.15s ease;
  }
  .modal-overlay.hide { animation: fadeOut 0.15s ease forwards; }
  @keyframes fadeOut { to { opacity: 0; } }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    width: 100%; max-width: 440px; padding: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5); animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .modal-close {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 18px; padding: 2px 6px; border-radius: 6px; transition: background 0.15s;
  }
  .modal-close:hover { background: var(--surface2); }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block; font-size: 11px; font-weight: 600; color: var(--text2);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px;
  }
  .modal-field input[type="text"],
  .modal-field input[type="date"],
  .modal-field textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px;
    padding: 9px 12px; outline: none; transition: border-color 0.15s;
  }
  .modal-field input:focus, .modal-field textarea:focus { border-color: var(--accent); }
  .modal-field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .modal-field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
  .priority-btns { display: flex; gap: 6px; }
  .priority-btn {
    flex: 1; padding: 7px 4px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-size: 12px; font-family: inherit;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .priority-btn.active-high { background: rgba(242,95,92,0.15); border-color: var(--red); color: var(--red); }
  .priority-btn.active-mid { background: rgba(245,166,35,0.15); border-color: var(--orange); color: var(--orange); }
  .priority-btn.active-low { background: rgba(90,100,128,0.2); border-color: var(--text3); color: var(--text2); }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-btn {
    flex: 1; padding: 10px; border-radius: 9px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .modal-btn:hover { opacity: 0.85; }
  .modal-btn-save { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .modal-btn-delete { background: rgba(242,95,92,0.15); color: var(--red); border: 1px solid rgba(242,95,92,0.3); flex: 0 0 auto; padding: 10px 16px; }
  .task-memo { font-size: 11px; color: var(--text3); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* タスク編集モーダル */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.15s ease; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%; max-width: 440px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    overflow: hidden;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-header {
    padding: 16px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .modal-close {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 6px;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--surface2); color: var(--text); }
  .modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .modal-field label {
    display: block; font-size: 11px; font-weight: 600; color: var(--text2);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px;
  }
  .modal-field input[type="text"],
  .modal-field input[type="date"],
  .modal-field textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px;
    padding: 9px 12px; outline: none; transition: border-color 0.15s;
  }
  .modal-field input:focus, .modal-field textarea:focus { border-color: var(--accent); }
  .modal-field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .modal-field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
  .priority-btns { display: flex; gap: 6px; }
  .priority-btn {
    flex: 1; padding: 7px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-family: inherit;
    font-size: 12px; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .priority-btn.active-high { background: rgba(242,95,92,0.15); border-color: var(--red); color: var(--red); }
  .priority-btn.active-mid { background: rgba(245,166,35,0.15); border-color: var(--orange); color: var(--orange); }
  .priority-btn.active-low { background: rgba(90,100,128,0.2); border-color: var(--text3); color: var(--text2); }
  .modal-footer {
    padding: 12px 18px 16px;
    display: flex; gap: 8px; border-top: 1px solid var(--border);
  }
  .btn-save {
    flex: 1; padding: 10px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; font-family: inherit; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-delete {
    padding: 10px 16px; border-radius: 9px;
    background: rgba(242,95,92,0.12); border: 1px solid rgba(242,95,92,0.3);
    color: var(--red); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-delete:hover { background: rgba(242,95,92,0.2); }
  /* タスクにメモアイコン表示 */
  .task-memo-icon { font-size: 10px; color: var(--text3); }
</style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<header>
  <div class="logo">🤖</div>
  <h1>AI タスクマネージャー</h1>
  <span id="sync-status" style="font-size:10px;color:var(--text3);margin-left:2px;flex-shrink:0;"></span>
  <button class="notif-btn" id="notif-btn" onclick="requestNotification()">
    <span class="notif-dot"></span>
    <span id="notif-label">通知</span>
  </button>

        <button class="hint-chip" onclick="sendHint('今週の振り返りをして')">📊 振り返り</button>
        <button class="hint-chip" onclick="sendHint('期限切れのタスクは？')">⚠️ 期限切れ</button>

<!-- ボトムタブ（スマホのみ表示） -->
<div class="bottom-tabs">

    <span class="tab-icon">📋</span>
    <span>タスク</span>
  </button>
  <button class="bottom-tab active" id="tab-chat" onclick="switchPanel('chat')">
    <span class="tab-icon">💬</span>
    <span>チャット</span>
  </button>

<script>
// ============================================================
// パネル切り替え（スマホ）
// ============================================================
function switchPanel(panel) {
  const taskPanel = document.getElementById('task-panel');
  const chatPanel = document.getElementById('chat-panel');
  const tabTasks = document.getElementById('tab-tasks');
  const tabChat = document.getElementById('tab-chat');

  if (panel === 'tasks') {
    taskPanel.classList.remove('hidden');
    chatPanel.classList.add('hidden');
    tabTasks.classList.add('active');
    tabChat.classList.remove('active');
  } else {
    chatPanel.classList.remove('hidden');
    taskPanel.classList.add('hidden');
    tabChat.classList.add('active');
    tabTasks.classList.remove('active');
    setTimeout(() => {
      const msgs = document.getElementById('chat-messages');
      msgs.scrollTop = msgs.scrollHeight;
    }, 100);
  }
}

// PC/スマホ判定
function initLayout() {
  const isPC = window.innerWidth > 700;
  const taskPanel = document.getElementById('task-panel');
  const chatPanel = document.getElementById('chat-panel');
  // どちらも常時表示
  taskPanel.classList.remove('hidden');
  chatPanel.classList.remove('hidden');
}
window.addEventListener('resize', initLayout);
initLayout();

// ============================================================
// GAS連携
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxGuE3s1jfyOwy7ZRIO_JlrTYAHXcHarv4p0tFVXoALRnYd2J7hFocdW21POWyo0F_y0A/exec';
let gasLoaded = false; // GAS読み込み完了フラグ

function setSyncStatus(msg, color = 'var(--text3)') {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = color; }
}

async function saveToGAS() {
  if (!gasLoaded) { showToast('⏳ 読み込み中です。少し待ってから保存してください', '', 3000); return; }
  if (!tasks.length) { showToast('💾 保存するタスクがありません', '', 2000); return; }
  setSyncStatus('保存中...', 'var(--orange)');
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveTasks', tasks })
    });
    const data = await res.json();
    if (data.status === 'ok') {
      setSyncStatus('✅ 保存済み', 'var(--green)');
      setTimeout(() => setSyncStatus(''), 3000);
    } else {
      setSyncStatus('❌ 保存失敗', 'var(--red)');
    }
  } catch(e) {
    setSyncStatus('❌ 通信エラー', 'var(--red)');
  }
}

async function loadFromGAS() {
  setSyncStatus('読込中...', 'var(--orange)');
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'loadTasks' })
    });
    const data = await res.json();
    if (data.status === 'ok' && data.tasks && data.tasks.length > 0) {
      tasks = data.tasks;
      taskIdCounter = Math.max(...tasks.map(t => Number(t.id) || 0)) + 1;
      renderTasks();
      setSyncStatus(`✅ ${tasks.length}件`, 'var(--green)');
      setTimeout(() => setSyncStatus(''), 3000);
      gasLoaded = true;
      return true;
    }
    gasLoaded = true; // データなしでも読み込み完了
    setSyncStatus('', '');
    return false;
  } catch(e) {
    gasLoaded = true; // エラーでも操作できるようにフラグON
    setSyncStatus('', '');
    return false;
  }
}

// ============================================================
// 状態
// ============================================================
let tasks = [];
let taskIdCounter = 1;
let currentFilter = 'all';
let isLoading = false;
const notifiedSet = new Set();

// ============================================================
// 通知
// ============================================================
function requestNotification() {
  if (!('Notification' in window)) { showToast('⚠️ このブラウザは通知未対応です', '', 4000); return; }
  if (Notification.permission === 'granted') { showToast('✅ 通知はすでに有効です', '', 3000); return; }
  Notification.requestPermission().then(p => {
    updateNotifBtn(p);
    if (p === 'granted') showToast('🔔 通知を有効にしました！', '', 4000);
    else showToast('🔕 通知が拒否されました', 'ブラウザ設定から許可してください', 4000);
  });
}
function updateNotifBtn(perm) {
  const btn = document.getElementById('notif-btn');
  const label = document.getElementById('notif-label');
  if (perm === 'granted') { btn.className = 'notif-btn granted'; label.textContent = 'ON'; }
  else if (perm === 'denied') { btn.className = 'notif-btn denied'; label.textContent = 'ブロック'; }
  else { btn.className = 'notif-btn'; label.textContent = '通知'; }
}
if ('Notification' in window) updateNotifBtn(Notification.permission);

// ============================================================
// リマインダー
// ============================================================
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function checkReminders() {
  const now = new Date();
  const todayStr = toDateStr(now);
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate()+1);
  const tomorrowStr = toDateStr(tomorrow);
  const rTime = document.getElementById('r-time').value || '09:00';
  const [rH, rM] = rTime.split(':').map(Number);
  const isReminderTime = now.getHours() === rH && now.getMinutes() === rM;

  tasks.filter(t => !t.done && t.dueDate).forEach(t => {
    const kT = `today-${t.id}-${todayStr}`;
    const kB = `before-${t.id}-${todayStr}`;
    const kO = `overdue-${t.id}-${todayStr}`;
    if (document.getElementById('r-today').checked && t.dueDate === todayStr && isReminderTime && !notifiedSet.has(kT)) {
      notifiedSet.add(kT); fireNotification('📅 今日が期日です', `「${t.title}」`);
    }
    if (document.getElementById('r-before').checked && t.dueDate === tomorrowStr && isReminderTime && !notifiedSet.has(kB)) {
      notifiedSet.add(kB); fireNotification('⏰ 明日が期日です', `「${t.title}」`);
    }
    if (document.getElementById('r-overdue').checked && t.dueDate < todayStr && !notifiedSet.has(kO)) {
      notifiedSet.add(kO); fireNotification('🚨 期限切れ', `「${t.title}」`);
    }
  });
}
function fireNotification(title, body) {
  if (Notification.permission === 'granted') new Notification(title, { body });
  showToast(title, body, 7000);
}
setInterval(checkReminders, 60000);

// ============================================================
// トースト
// ============================================================
function showToast(title, body, duration = 5000) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `
    <div class="toast-title">
      <span>${escapeHtml(title)}</span>
      <button class="toast-close" onclick="closeToast(this.closest('.toast'))">✕</button>
    </div>
    ${body ? `<div class="toast-body">${escapeHtml(body)}</div>` : ''}
  `;
  container.appendChild(el);
  setTimeout(() => closeToast(el), duration);
}
function closeToast(el) {
  if (!el || !el.parentElement) return;
  el.classList.add('hide');
  setTimeout(() => el.remove(), 300);
}

// ============================================================
// タスク操作
// ============================================================
function addTask(title, dueDate = null, priority = 'mid', tags = [], memo = '') {
  const t = { id: taskIdCounter++, title, dueDate, priority, tags, done: false, memo };
  tasks.push(t); renderTasks(); return t;
}
function toggleTask(id) {
  const t = tasks.find(t => String(t.id) === String(id));
  if (t) { t.done = !t.done; renderTasks(); }
}
function deleteTask(id) { tasks = tasks.filter(t => String(t.id) !== String(id)); renderTasks(); }
function getTasksForAI() {
  return tasks.map(({ id, title, dueDate, priority, tags, done, memo }) => ({ id, title, dueDate, priority, tags, done, memo: memo || '' }));
}

// ============================================================
// レンダリング
// ============================================================
function renderTasks() {
  const list = document.getElementById('task-list');
  document.getElementById('task-count').textContent = `${tasks.filter(t => !t.done).length}件`;
  let filtered = tasks;
  if (currentFilter === 'todo') filtered = tasks.filter(t => !t.done);
  if (currentFilter === 'done') filtered = tasks.filter(t => t.done);
  if (currentFilter === 'high') filtered = tasks.filter(t => t.priority === 'high' && !t.done);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">タスクがありません<br>チャットで追加してください 💬</div>'; return;
  }
  const todayStr = toDateStr(new Date());
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr = toDateStr(tomorrow);

  list.innerHTML = filtered.map(t => {
    let dueClass = '', dueLabel = '';
    if (t.dueDate) {
      if (t.dueDate < todayStr && !t.done)  { dueClass = 'overdue'; dueLabel = '期限切れ'; }
      else if (t.dueDate === todayStr)       { dueClass = 'soon';    dueLabel = '今日'; }
      else if (t.dueDate === tomorrowStr)    { dueClass = 'soon';    dueLabel = '明日'; }
      else { const d = new Date(t.dueDate); dueLabel = `${d.getMonth()+1}/${d.getDate()}`; }
    }
    return `
      <div class="task-item ${t.done ? 'done' : ''}" onclick="openModal('${t.id}')">
        <div class="task-check" onclick="event.stopPropagation();toggleTask('${t.id}')">${t.done ? '✓' : ''}</div>
        <div class="task-body">
          <div class="task-title">${escapeHtml(t.title)}</div>
          <div class="task-meta">
            <div class="priority-dot p-${t.priority}"></div>
            ${t.dueDate ? `<span class="task-due ${dueClass}">${dueLabel}</span>` : ''}
            ${t.tags.map(g => `<span class="task-tag">${escapeHtml(g)}</span>`).join('')}
            ${t.dueDate && !t.done ? `<span class="reminder-icon">🔔</span>` : ''}
          </div>
          ${t.memo ? `<div class="task-memo">${escapeHtml(t.memo)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}
function filterTasks(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

// ============================================================
// チャット
// ============================================================
function addMsg(role, html, preview = null) {
  const container = document.getElementById('chat-messages');
  container.querySelector('.welcome-hint')?.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
    <div class="msg-bubble">${html}${preview ? `<div class="task-preview"><strong>✅ タスク操作</strong>${escapeHtml(preview)}</div>` : ''}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}
function addTyping() {
  const d = addMsg('ai', '<div class="typing-dots"><span></span><span></span><span></span></div>');
  d.id = 'typing-indicator'; return d;
}
function removeTyping() { document.getElementById('typing-indicator')?.remove(); }

// ============================================================
// AI API（Vercel経由）
// ============================================================
async function callAI(userMessage) {
  const today = new Date();
  const todayStr = toDateStr(today);
  const tomorrowStr = toDateStr(new Date(today.getFullYear(), today.getMonth(), today.getDate()+1));
  const daysToFri = (5 - today.getDay() + 7) % 7 || 7;
  const fridayStr = toDateStr(new Date(today.getFullYear(), today.getMonth(), today.getDate()+daysToFri));

  const sys = `あなたはタスク管理アシスタントです。
今日: ${todayStr} / 明日: ${tomorrowStr} / 今週金曜: ${fridayStr}
現在のタスク: ${JSON.stringify(getTasksForAI())}

## 応答（JSONのみ返すこと）
{"message":"返答","actions":[...],"summary":"操作説明 or null"}

actionsの種類:
- タスク追加: {"type":"add","title":"名前","dueDate":"YYYY-MM-DD or null","priority":"high/mid/low","tags":[],"memo":"詳細メモ（任意）"}
- 編集:       {"type":"edit","id":ID番号,"title":"新しい名前","dueDate":"日付 or null","priority":"high/mid/low","memo":"詳細メモ"}
- 完了:       {"type":"complete","id":ID番号}
- 削除:       {"type":"delete","id":ID番号}
- 全完了:     {"type":"completeAll"}

優先度: high=急ぎ/今日/重要, mid=通常(デフォルト), low=いつかやる
期日: 今日→${todayStr} 明日→${tomorrowStr} 今週→${fridayStr} なし→null
memoはユーザーが詳細や補足を伝えたときに書き込む。編集アクションは既存タスクの内容変更に使う。
JSONのみ。前置き不要。`;

  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: sys, messages: [{ role: 'user', content: userMessage }] })
  });
  const data = await res.json();
  const raw = data.content?.[0]?.text || '{}';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ============================================================
// 送信
// ============================================================
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = ''; autoResize(input);
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addMsg('user', escapeHtml(text));
  addTyping();

  try {
    const result = await callAI(text);
    const summary = [];
    for (const a of (result.actions || [])) {
      if (a.type === 'add') {
        const t = addTask(a.title, a.dueDate, a.priority || 'mid', a.tags || [], a.memo || '');
        summary.push(`「${t.title}」を追加`);
        if (a.dueDate) showToast('📌 タスク追加', `「${t.title}」`, 2500);
      } else if (a.type === 'edit') {
        const t = tasks.find(t => String(t.id) === String(a.id));
        if (t) {
          if (a.title !== undefined) t.title = a.title;
          if (a.dueDate !== undefined) t.dueDate = a.dueDate;
          if (a.priority !== undefined) t.priority = a.priority;
          if (a.memo !== undefined) t.memo = a.memo;
          renderTasks();
          summary.push(`「${t.title}」を編集`);
        }
      } else if (a.type === 'complete') {
        const t = tasks.find(t => String(t.id) === String(a.id));
        if (t) { t.done = true; summary.push(`「${t.title}」を完了`); renderTasks(); }
      } else if (a.type === 'delete') {
        const t = tasks.find(t => String(t.id) === String(a.id));
        if (t) summary.push(`「${t.title}」を削除`);
        deleteTask(a.id);
      } else if (a.type === 'completeAll') {
        tasks.forEach(t => t.done = true); renderTasks();
        summary.push('すべてのタスクを完了');
      }
    }
    removeTyping();
    addMsg('ai', escapeHtml(result.message || '処理しました'), summary.length ? summary.join('、') : null);

    // タスク操作があった場合は自動保存
    if (summary.length > 0) {
      saveToGAS();
      if (window.innerWidth <= 700) {
        setTimeout(() => showToast('📋 下のタスク一覧に追加しました', '', 2000), 400);
      }
    }
  } catch (err) {
    removeTyping();
    addMsg('ai', '⚠️ エラーが発生しました。もう一度試してください。');
    console.error(err);
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}



// ============================================================
// 折りたたみ
// ============================================================
function togglePanel(panel) {
  // スマホのみ動作
  if (window.innerWidth > 700) return;
  if (panel === 'task') {
    const el = document.getElementById('task-panel');
    el.classList.toggle('collapsed');
  } else if (panel === 'chat') {
    const el = document.getElementById('chat-panel');
    el.classList.toggle('collapsed');
  }
}

function toggleReminder() {
  const body = document.getElementById('reminder-body');
  const arrow = document.getElementById('reminder-arrow');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  arrow.style.transform = isOpen ? 'rotate(-90deg)' : 'rotate(0deg)';
}

// スマホのときチャットヘッダーを表示
function updateChatHeader() {
  const header = document.getElementById('chat-header');
  if (header) header.style.display = window.innerWidth <= 700 ? 'flex' : 'none';
}
window.addEventListener('resize', updateChatHeader);
updateChatHeader();

// ============================================================
// タスク編集モーダル
// ============================================================
let editingTaskId = null;
let currentPriority = 'mid';

function openModal(id) {
  const t = tasks.find(t => String(t.id) === String(id));
  if (!t) return;
  editingTaskId = id;
  document.getElementById('modal-title').value = t.title || '';
  document.getElementById('modal-due').value = t.dueDate || '';
  document.getElementById('modal-memo').value = t.memo || '';
  selectPriority(t.priority || 'mid');
  const modal = document.getElementById('task-modal');
  modal.style.display = 'flex';
  modal.classList.remove('hide');
  setTimeout(() => document.getElementById('modal-title').focus(), 100);
}

function closeModal() {
  const modal = document.getElementById('task-modal');
  modal.classList.add('hide');
  setTimeout(() => { modal.style.display = 'none'; modal.classList.remove('hide'); }, 150);
  editingTaskId = null;
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('task-modal')) closeModal();
}

function selectPriority(p) {
  currentPriority = p;
  ['high','mid','low'].forEach(k => {
    const btn = document.getElementById('p-' + k);
    btn.className = 'priority-btn' + (k === p ? ' active-' + k : '');
  });
}

function saveModal() {
  if (!editingTaskId) return;
  const t = tasks.find(t => String(t.id) === String(editingTaskId));
  if (!t) return;
  const title = document.getElementById('modal-title').value.trim();
  if (!title) { document.getElementById('modal-title').focus(); return; }
  t.title = title;
  t.dueDate = document.getElementById('modal-due').value || null;
  t.priority = currentPriority;
  t.memo = document.getElementById('modal-memo').value.trim();
  renderTasks();
  saveToGAS();
  closeModal();
  showToast('✅ タスクを更新しました', '', 2000);
}

function deleteFromModal() {
  if (!editingTaskId) return;
  const t = tasks.find(t => String(t.id) === String(editingTaskId));
  if (!confirm(`「${t?.title}」を削除しますか？`)) return;
  deleteTask(editingTaskId);
  saveToGAS();
  closeModal();
  showToast('🗑️ タスクを削除しました', '', 2000);
}

// Escキーでモーダルを閉じる
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

function sendHint(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}


// ============================================================
// ユーティリティ
// ============================================================
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,100)+'px'; }
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// 起動時にGASからタスクを読み込む
window.addEventListener('DOMContentLoaded', async () => {
  await loadFromGAS();
  setTimeout(checkReminders, 2500);
});
</script>

<!-- タスク編集モーダル -->
<div class="modal-overlay" id="task-modal" style="display:none;" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ タスクを編集</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-field">
      <label>タスク名</label>
      <input type="text" id="modal-title" placeholder="タスク名を入力">
    </div>
    <div class="modal-field">
      <label>期日</label>
      <input type="date" id="modal-due">
    </div>
    <div class="modal-field">
      <label>優先度</label>
      <div class="priority-btns">
        <button class="priority-btn" id="p-high" onclick="selectPriority('high')">🔴 高</button>
        <button class="priority-btn" id="p-mid"  onclick="selectPriority('mid')">🟡 中</button>
        <button class="priority-btn" id="p-low"  onclick="selectPriority('low')">⚪ 低</button>
      </div>
    </div>
    <div class="modal-field">
      <label>詳細メモ</label>
      <textarea id="modal-memo" placeholder="詳細・補足メモを入力（任意）"></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-delete" onclick="deleteFromModal()">🗑️ 削除</button>
      <button class="modal-btn modal-btn-save" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>
</body>
</html>
