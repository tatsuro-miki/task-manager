  .tab{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}

  .tab-badge{display:inline-block;background:var(--accent2);color:#fff;border-radius:10px;font-size:10px;padding:0 6px;margin-left:4px;font-weight:700;}

  .emp-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:var(--accent);}
  .emp-card.selected{border-color:var(--accent);background:#eef3fa;}
  .emp-name{font-size:18px;font-weight:700;margin-bottom:2px;}
  .emp-yomi{font-size:11px;color:var(--text2);margin-bottom:8px;}
  .emp-meta{display:flex;flex-wrap:wrap;gap:6px;}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
  .badge-blue{background:#ddeeff;color:var(--accent);}
  .badge-green{background:#ddf0e8;color:var(--success);}
  .badge-orange{background:#fef0d9;color:#b07010;}
  .badge-gray{background:var(--surface2);color:var(--text2);}

  .info-table th{background:var(--surface2);font-weight:600;width:160px;white-space:nowrap;}
  .mail-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .mail-addr{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--accent);flex:1;word-break:break-all;}
  .copy-btn{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:500;white-space:nowrap;}
  .copy-btn:hover{background:#1d4a7e;}
  .copy-btn.copied{background:var(--success);}
  .checklist{list-style:none;}

  .checklist li:last-child{border-bottom:none;}
  .checklist input[type=checkbox]{width:16px;height:16px;margin-top:2px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;}
  .check-label{flex:1;cursor:pointer;}
  .check-label.done{text-decoration:line-through;color:var(--text2);}
  .check-label strong{display:block;font-weight:600;font-size:13px;}
  .check-label span{font-size:12px;color:var(--text2);}
  .check-who{font-size:11px;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
  .who-me{background:#ddeeff;color:var(--accent);}
  .who-asano{background:#fef0d9;color:#b07010;}
  .mail-draft{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-all;}
  .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px;}
  .progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
  .progress-text{font-size:11px;color:var(--text2);text-align:right;margin-top:2px;}
  .btn{display:inline-block;padding:8px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:600;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#1d4a7e;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}
  .btn-green{background:var(--success);color:#fff;}
  .btn-green:hover{background:#1d5a3f;}
  .alert{padding:12px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:12px;}
  .alert-info{background:#ddeeff;color:var(--accent);border:1px solid #b8d0f0;}

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let employees=[],checks={},selectedEmpId=null;

// ===== GAS連携設定 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxGuE3s1jfyOwy7ZRIO_JlrTYAHXcHarv4p0tFVXoALRnYd2J7hFocdW21POWyo0F_y0A/exec';

function setSyncStatus(msg, color='#fff') {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = color; }
}

// GASに保存
async function saveToGAS() {
  if (!employees.length) { alert('保存するデータがありません'); return; }
  setSyncStatus('保存中...', '#ffd');
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ token: 'miki_gas_2026', action: 'saveAll', employees, checks })
    });
    const data = await res.json();
    if (data.status === 'ok') {
      setSyncStatus('✅ 保存済み ' + new Date().toLocaleTimeString('ja-JP'), '#afffaf');
      setTimeout(() => setSyncStatus(''), 4000);
    } else {
      setSyncStatus('❌ 保存失敗', '#ffaaaa');
      alert('保存失敗: ' + data.message);
    }
  } catch(e) {
    setSyncStatus('❌ 通信エラー', '#ffaaaa');
    alert('通信エラー: ' + e.message);
  }
}

// GASから読み込み
async function loadFromGAS() {
  setSyncStatus('読み込み中...', '#ffd');
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ token: 'miki_gas_2026', action: 'loadAll' })
    });
    const data = await res.json();
    if (data.status === 'ok' && data.employees && data.employees.length > 0) {
      employees = data.employees;
      checks = data.checks || {};
      selectedEmpId = employees[0]?.id || null;
      renderAll();
      if (selectedEmpId) { renderDetail(selectedEmpId); renderMailDraft(selectedEmpId); }
      setSyncStatus('✅ 読み込み完了 ' + employees.length + '名', '#afffaf');
      setTimeout(() => setSyncStatus(''), 4000);
    } else if (data.status === 'ok') {
      setSyncStatus('（データなし）', '#ccc');
      alert('スプレッドシートにデータがありません');
    } else {
      setSyncStatus('❌ 読み込み失敗', '#ffaaaa');
      alert('読み込み失敗: ' + data.message);
    }
  } catch(e) {
    setSyncStatus('❌ 通信エラー', '#ffaaaa');
    alert('通信エラー: ' + e.message);
  }
}

// ローカル保存（バックアップ用）
const STORAGE_KEY = 'saiyou_tool_data';
function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ employees, checks, selectedEmpId, savedAt: new Date().toLocaleString('ja-JP') }));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.employees && data.employees.length > 0) {
      employees = data.employees;
      checks = data.checks || {};
      selectedEmpId = data.selectedEmpId || employees[0]?.id || null;
      return true;
    }
  } catch(e) {}
  return false;
}

function clearStorage() {
  if (!confirm('ローカルデータを削除しますか？\n（スプレッドシートのデータは残ります）')) return;
  localStorage.removeItem(STORAGE_KEY);
  employees = []; checks = {}; selectedEmpId = null;
  renderAll();
}



// 命名規則：名の頭文字 + . + 姓ローマ字  例: SHINYA SAYUKI → s.shinya@nosawa.co.jp
function generateEmail(romaji){
  if(!romaji)return'';
  const p=romaji.trim().toUpperCase().split(/\s+/);
  if(p.length<2)return'';
  return p[1][0].toLowerCase()+'.'+p[0].toLowerCase()+'@nosawa.co.jp';
}

// ===== PDF解析：座標ベース方式 =====
// ラベル（x<180）と値（x>=180）を座標で分離し、同一Y行ごとにマッピング

async function readPDFSpans(file){
  // PDF.jsで全spanを座標付きで取得
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:ab}).promise;
  const spans = [];
  for(let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    for(const item of content.items){
      const t = item.str.trim();
      if(t) spans.push({t, x: item.transform[4], y: item.transform[5]});
    }
  }
  return spans;
}

function buildRowMap(spans){
  // Y座標（±5px）でグループ化してラベル→値マップを作る
  // PDF.jsのyは下から上なので降順ソート→上から順に処理
  spans.sort((a,b) => b.y - a.y || a.x - b.x);
  const rows = [];
  let cur = null;
  for(const s of spans){
    if(!cur || Math.abs(s.y - cur.y) > 5){
      cur = {y: s.y, labels:[], values:[]};
      rows.push(cur);
    } else {
      cur.y = (cur.y + s.y) / 2; // 平均Y
    }
    // x<180をラベル列、x>=180を値列とする
    if(s.x < 180) cur.labels.push(s.t);
    else           cur.values.push(s.t);
  }

  // ラベル→値 マップを構築（ラベルを結合してキーに）
  const map = {}; // 'ふりがな' -> ['やまだ','たろう']
  for(const row of rows){
    if(!row.labels.length) continue;
    // 数字だけのラベル（※2の「2」など）は除外してラベル結合
    const key = row.labels
      .filter(l => !/^\d+$/.test(l) && l !== '■')
      .join('')
      .replace(/[※＊\*\s\d]+$/,'')  // 末尾の※2などを除去
      .trim();
    if(key) map[key] = row.values;
  }
  return map;
}

function getVal(map, labelPattern, idx=0){
  // labelPatternに前方一致するキーを検索
  const key = Object.keys(map).find(k => k.startsWith(labelPattern));
  if(!key) return '';
  const vals = map[key] || [];
  // ドロップダウンの説明文（「/」区切りのもの）を除外
  const clean = vals.filter(v => !v.includes('/中途') && !v.includes('※例'));
  return (clean[idx] || '').trim();
}

async function parsePDF(file){
  const spans = await readPDFSpans(file);
  const map = buildRowMap(spans);

  const emp = {
    id: String(Date.now())+'_'+String(Math.floor(Math.random()*10000)),
    name:'', yomi:'', yomiSei:'', yomiMei:'',
    romaji:'', empNo:'', office:'', dept:'',
    type:'', pc:'', mobile:'',
    forward:'', nserver:'', anshin:'',
    groupMails:[], relo:false, email:'',
    joinDate:'', role:'', jobType:'', depts:[], rates:[]
  };

  // ふりがな（姓=idx0, 名=idx1）
  emp.yomiSei = getVal(map,'ふりがな', 0);
  emp.yomiMei = getVal(map,'ふりがな', 1);
  emp.yomi    = [emp.yomiSei, emp.yomiMei].filter(Boolean).join('　');

  // 氏名（姓=idx0, 名=idx1）
  const sei = getVal(map,'氏名', 0);
  const mei = getVal(map,'氏名', 1);
  emp.name = [sei, mei].filter(Boolean).join('　');

  // 英語表記
  emp.romaji = getVal(map,'英語表記', 0).toUpperCase();
  // 「YAMADA TARO」が2トークンに分かれている場合は結合
  if(!emp.romaji.includes(' ')){
    const vals = (map[Object.keys(map).find(k=>k.startsWith('英語表記'))]||[])
      .filter(v=>/^[A-Za-z]+$/.test(v));
    if(vals.length>=2) emp.romaji = vals.join(' ').toUpperCase();
  }

  // 社員番号
  emp.empNo = getVal(map,'社員番号', 0);

  // 入社予定日（YYYY-MM-DD または 令和X年Y月Z日）
  const jdRaw = getVal(map,'入社予定日', 0).replace(/\s/g,'');
  const mISO = jdRaw.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  const mJP  = jdRaw.match(/令和(\d+)年(\d+)月(\d+)日/);
  if(mISO){
    const reiwa = parseInt(mISO[1]) - 2018;
    emp.joinDate = `令和${reiwa}年${parseInt(mISO[2])}月${parseInt(mISO[3])}日`;
  } else if(mJP){
    emp.joinDate = `令和${mJP[1]}年${mJP[2]}月${mJP[3]}日`;
  }

  // 入社区分（ドロップダウン値の1つ目＝選択値）
  const typeRaw = getVal(map,'入社区分', 0);
  const typeMap = {'新卒社員':'新卒','中途社員':'中途','正社員へ変更':'正社員変更','派遣':'派遣','業務委託':'業務委託'};
  emp.type = typeMap[typeRaw] || typeRaw || '';

  // 勤務先・役職・職種
  emp.office  = getVal(map,'勤務先', 0);
  emp.role    = getVal(map,'役職',   0);
  emp.jobType = getVal(map,'職種',   0);

  // 部課：/^[A-Z]\d$/ 形式のspanのうち一番左（x座標最小）の1つだけ
  const deptSpans = spans.filter(s => /^[A-Z]\d$/.test(s.t));
  deptSpans.sort((a,b) => a.x - b.x);
  emp.depts = deptSpans.length ? [deptSpans[0].t] : [];

  // 分担率：部課スパンのy座標（±10px）に隣接する数値スパンを取得
  if(deptSpans.length > 0){
    const deptY = deptSpans[0].y;
    const rateSpans = spans.filter(s =>
      /^\d{1,3}$/.test(s.t) &&
      Math.abs(s.y - deptY) > 5 && Math.abs(s.y - deptY) < 35 &&
      parseInt(s.t) < 100
    );
    emp.rates = rateSpans.map(s=>s.t);
  }
  emp.dept = emp.depts[0] || '';

  // 携帯電話・パソコン
  const mobileRaw = getVal(map,'携帯電話', 0);
  emp.mobile = (mobileRaw==='不必要'||mobileRaw==='不要') ? '不要' : mobileRaw;
  const pcRaw = getVal(map,'パソコン', 0);
  emp.pc = (pcRaw==='不必要'||pcRaw==='不要') ? '不要' : pcRaw;

  // リロクラブ
  emp.relo = getVal(map,'リロクラブ',0) === '必要';

  // メールアドレス（@を含む値を全収集）
  const allVals = Object.values(map).flat();
  emp.groupMails = [...new Set(allVals.filter(v=>v.includes('@nosawa.co.jp')))];

  // メール転送・N-SERVER・安心君
  emp.forward = getVal(map,'メール転送設定', 0).replace(/^不必要$/,'');
  emp.nserver = getVal(map,'N-SERVERアクセス権', 0).replace(/^不必要$/,'');
  emp.anshin  = getVal(map,'安心君アクセス権',   0).replace(/^不必要$/,'');

  emp.email = generateEmail(emp.romaji);
  return emp;
}

async function processFiles(files){
  if(!files.length)return;
  document.getElementById('loadingArea').style.display='block';
  document.getElementById('mainContent').style.display='none';
  for(const f of files){
    if(!f.name.toLowerCase().endsWith('.pdf'))continue;
    try{
      const emp=await parsePDF(f);
      emp.fileName=f.name;
      if(emp.empNo&&employees.find(e=>e.empNo===emp.empNo))continue;
      employees.push(emp);checks[emp.id]={};
    }catch(e){console.error(e);alert('読み込みエラー: '+f.name+'\n'+e.message);}
  }
  document.getElementById('loadingArea').style.display='none';
  renderAll();
  saveToStorage();
}

function deleteEmployee(empId){
  if(!confirm('この社員を削除しますか？'))return;
  employees=employees.filter(e=>e.id!==empId);
  delete checks[empId];
  if(selectedEmpId===empId)selectedEmpId=employees.length?employees[0].id:null;
  renderAll();
  saveToStorage();
  if(selectedEmpId){renderDetail(selectedEmpId);renderMailDraft(selectedEmpId);}
}

// 列順：ログイン名,表示名,新ログイン名,パスワード,姓,名,よみがな（姓）,よみがな（名）,
//       別言語での表示名,別言語の名前を表示する言語,メールアドレス,使用状態,言語,タイムゾーン,
//       電話番号,内線,携帯電話,URL,従業員ID,入社日,誕生日,コメント,表示優先度,Skype名,削除
function buildCsvRows(){
  const hdr=['ログイン名','表示名','新ログイン名','パスワード','姓','名',
    'よみがな（姓）','よみがな（名）','別言語での表示名','別言語の名前を表示する言語',
    'メールアドレス','使用状態','言語','タイムゾーン','電話番号','内線',
    '携帯電話','URL','従業員ID','入社日','誕生日','コメント','表示優先度','Skype名','削除'];
  const rows=[hdr];
  employees.forEach(emp=>{
    const np=emp.name?emp.name.split(/[\s　]+/):['',''];
    rows.push([
      emp.email||'', // ログイン名（メールアドレスと同じ）
      emp.name||'',   // 表示名
      '',             // 新ログイン名
      '',             // パスワード
      np[0]||'',      // 姓
      np[1]||'',      // 名
      emp.yomiSei||'',// よみがな（姓）
      emp.yomiMei||'',// よみがな（名）
      '','',          // 別言語
      emp.email||'',  // メールアドレス
      '使用する',      // 使用状態
      'ja',           // 言語
      'Asia/Tokyo',   // タイムゾーン
      '','','','',    // 電話番号,内線,携帯,URL
      emp.empNo||'',  // 従業員ID
      '2026/04/01',   // 入社日
      '','','','',''  // 誕生日,コメント,優先度,Skype,削除
    ]);
  });
  return rows;
}

function toCsvStr(rows){
  return rows.map(r=>r.map(c=>{
    const s=String(c);
    return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\r\n');
}

function downloadCsv(){
  const csv=toCsvStr(buildCsvRows());
  // サイボウズはShift-JIS(CP932)でインポートするため変換
  const sjisArray=Encoding.convert(Encoding.stringToCode(csv),{to:'SJIS',from:'UNICODE'});
  const blob=new Blob([new Uint8Array(sjisArray)],{type:'text/csv;charset=shift_jis;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  const d=new Date();
  a.download=`cybozu_users_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.csv`;
  a.click();URL.revokeObjectURL(url);
}

function renderCsvTab(){

  const rows=buildCsvRows();
  const preview=toCsvStr(rows);
  const COLS=['ログイン名','表示名','姓','名','よみがな（姓）','よみがな（名）','メールアドレス','使用状態','従業員ID','入社日'];
  const IDXS=[0,1,4,5,6,7,10,11,18,19];
  const thead=COLS.map(h=>`<th style="padding:8px 10px;border:1px solid var(--border);font-size:12px;background:var(--surface2);white-space:nowrap;">${h}</th>`).join('');

  area.innerHTML=`

      </div>
      <div class="card-body">
        <div class="alert alert-success" style="margin-bottom:12px;">
          ✅ テンプレートの列順（25列）に合わせて出力します。<br>
          ⚠️ 携帯電話番号など空欄の項目は、ダウンロード後に追記してください。
        </div>
        <div style="overflow-x:auto;margin-bottom:16px;">

}

function renderProgress(){
  const area=document.getElementById('progressArea');
  if(!employees.length){area.innerHTML='<div class="empty-state"><p>社員データがありません</p></div>';return;}
  const rows=employees.map(emp=>{
    const tasks=getTasks(emp);
    const done=tasks.filter(t=>checks[emp.id]?.[t.key]).length;
    const pct=Math.round(done/tasks.length*100);
    const col=pct===100?'#2d7a4f':pct>50?'#2d5a8e':'#c0392b';
    return`<tr>
      <td style="padding:10px 12px;font-weight:600;border-bottom:1px solid var(--border);">${emp.name}</td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);">${emp.office||'—'}</td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);">${emp.type}</td>
      <td style="padding:10px 12px;min-width:160px;border-bottom:1px solid var(--border);">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${col};"></div></div>
        <div class="progress-text">${done}/${tasks.length} (${pct}%)</div>
      </td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);">
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 12px;" onclick="selectEmployee('${emp.id}')">詳細 →</button>
      </td></tr>`;
  }).join('');
  area.innerHTML=`<div class="card"><div class="card-header">📊 全体進捗</div>
    <div class="card-body" style="padding:0;">
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr style="background:var(--surface2);">
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:12px;">氏名</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:12px;">勤務先</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:12px;">区分</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:12px;">進捗</th>
          <th style="padding:10px 12px;border-bottom:1px solid var(--border);"></th>
        </tr></thead><tbody>${rows}</tbody>
      </table>
    </div></div>`;
}

function switchTab(name){
  const names=['list','detail','mail','csv','progress'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.section-toggle').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    if(!btn)return;
    const o=btn.textContent;btn.textContent='✓ コピー済み';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=o;btn.classList.remove('copied');},2000);
  });
}

  // GAS失敗時はローカルにフォールバック

    renderAll();

});
